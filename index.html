<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DualTalk — Vietnamese ↔ English</title>
<style>
  :root {
    --en-accent: #3B82F6;
    --en-bg: #EFF6FF;
    --en-border: #BFDBFE;
    --vi-accent: #EF4444;
    --vi-bg: #FEF2F2;
    --vi-border: #FECACA;
    --bg: #0F172A;
    --surface: #1E293B;
    --text: #F1F5F9;
    --muted: #94A3B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--en-accent), var(--vi-accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .header .detected {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #334155;
    color: var(--muted);
  }
  .header .detected.en { background: var(--en-bg); color: var(--en-accent); }
  .header .detected.vi { background: var(--vi-bg); color: var(--vi-accent); }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 6px 16px 10px;
    flex-shrink: 0;
  }
  .status-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .status-chip.en { background: var(--en-bg); color: var(--en-accent); }
  .status-chip.vi { background: var(--vi-bg); color: var(--vi-accent); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #64748B;
  }
  .status-dot.listening {
    background: #22C55E;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* Panels */
  .panels {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 10px;
    overflow: hidden;
    min-height: 0;
  }
  .panel {
    flex: 1;
    border-radius: 16px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .panel.en { background: var(--en-bg); border: 1px solid var(--en-border); color: #1E3A5F; }
  .panel.vi { background: var(--vi-bg); border: 1px solid var(--vi-border); color: #7F1D1D; }
  .panel-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .panel-messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  .panel-messages::-webkit-scrollbar { width: 3px; }
  .panel-messages::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 3px; }
  .msg {
    padding: 8px 10px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeSlide 0.3s ease;
    word-wrap: break-word;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.original { background: rgba(255,255,255,0.7); font-weight: 500; }
  .msg.translated { background: rgba(0,0,0,0.06); font-size: 13px; font-style: italic; opacity: 0.85; }
  .msg.interim { opacity: 0.5; font-style: italic; }

  /* Listening indicator */
  .listening-indicator {
    display: none;
    align-items: center;
    gap: 3px;
    padding: 4px 0;
    flex-shrink: 0;
  }
  .listening-indicator.active { display: flex; }
  .listening-indicator.en .bar { background: var(--en-accent); }
  .listening-indicator.vi .bar { background: var(--vi-accent); }
  .bar {
    width: 3px; border-radius: 2px; height: 12px;
    animation: barPulse 0.6s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes barPulse { from { height: 4px; } to { height: 16px; } }

  /* Controls */
  .controls {
    padding: 10px 16px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .big-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #475569;
    background: var(--surface);
    color: var(--text);
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .big-btn:active { transform: scale(0.92); }
  .big-btn.active {
    border-color: #22C55E;
    background: #166534;
    box-shadow: 0 0 20px rgba(34,197,94,0.3);
  }
  .settings-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid #334155;
    background: var(--surface);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle.active { border-color: var(--en-accent); color: var(--en-accent); background: rgba(59,130,246,0.1); }
  .toggle svg { width: 14px; height: 14px; }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 260px;
  }
  .volume-row svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #334155;
    outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--en-accent);
    cursor: pointer;
  }
  .mode-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* Unsupported banner */
  .unsupported {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
    text-align: center;
    z-index: 100;
  }
  .unsupported.show { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .unsupported h2 { font-size: 20px; margin-bottom: 12px; }
  .unsupported p { font-size: 14px; color: var(--muted); max-width: 300px; line-height: 1.6; }

  @media (orientation: landscape) and (max-height: 500px) {
    .panels { flex-direction: row; }
    .panel { min-width: 0; }
  }
</style>
</head>
<body>

<div class="unsupported" id="unsupported">
  <h2>Browser Not Supported</h2>
  <p>This app needs Chrome, Edge, or Safari on HTTPS. Please open in a supported browser.</p>
</div>

<div class="header">
  <h1>DualTalk</h1>
  <p>Real-time Vietnamese ↔ English translation</p>
  <div class="detected" id="langDetect">Tap mic to start</div>
</div>

<div class="status-bar">
  <div class="status-chip en">
    <div class="status-dot" id="enDot"></div>
    <span>English</span>
  </div>
  <div class="status-chip vi">
    <div class="status-dot" id="viDot"></div>
    <span>Tiếng Việt</span>
  </div>
</div>

<div class="panels">
  <div class="panel en">
    <div class="panel-label">English</div>
    <div class="listening-indicator en" id="enWave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="panel-messages" id="enMessages"></div>
  </div>
  <div class="panel vi">
    <div class="panel-label">Tiếng Việt</div>
    <div class="listening-indicator vi" id="viWave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="panel-messages" id="viMessages"></div>
  </div>
</div>

<div class="controls">
  <button class="big-btn" id="mainBtn" title="Start / Stop">
    <svg id="micIcon" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <div class="mode-label" id="modeLabel">Dual: EN + VI simultaneously</div>
  <div class="settings-row">
    <div class="toggle active" id="ttsToggle" onclick="toggleTTS()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      <span>Speak</span>
    </div>
    <div class="toggle active" id="autoScrollToggle" onclick="toggleAutoScroll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      <span>Scroll</span>
    </div>
    <div class="toggle" id="clearBtn" onclick="clearAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      <span>Clear</span>
    </div>
  </div>
  <div class="volume-row">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </div>
</div>

<script>
// ===== CONFIG =====
const EN_LANG = 'en-US';
const VI_LANG = 'vi-VN';
const TRANSLATE_API = 'https://api.mymemory.translated.net/get';

// ===== STATE =====
let isRunning = false;
let ttsEnabled = true;
let autoScroll = true;
let volume = 1.0;
let enRecognizer = null;
let viRecognizer = null;
let translateQueue = Promise.resolve();
let enLastFinal = '';
let viLastFinal = '';

// ===== ELEMENTS =====
const $mainBtn = document.getElementById('mainBtn');
const $enDot = document.getElementById('enDot');
const $viDot = document.getElementById('viDot');
const $enWave = document.getElementById('enWave');
const $viWave = document.getElementById('viWave');
const $enPanel = document.getElementById('enMessages');
const $viPanel = document.getElementById('viMessages');
const $langDetect = document.getElementById('langDetect');
const $modeLabel = document.getElementById('modeLabel');

// ===== INIT =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.getElementById('unsupported').classList.add('show');
}

document.getElementById('volumeSlider').addEventListener('input', e => {
  volume = parseFloat(e.target.value);
});

// ===== TRANSLATION =====
async function translate(text, from, to) {
  const fromCode = from === 'en' ? 'en' : 'vi';
  const toCode = to === 'en' ? 'en' : 'vi';
  try {
    const resp = await fetch(TRANSLATE_API + '?q=' + encodeURIComponent(text) + '&langpair=' + fromCode + '|' + toCode);
    const data = await resp.json();
    if (data.responseStatus === 200 && data.responseData) {
      return data.responseData.translatedText;
    }
    return '[Translation error]';
  } catch (e) {
    console.error('Translation error:', e);
    return '[Translation failed]';
  }
}

// ===== TTS =====
function speak(text, lang) {
  if (!ttsEnabled || !text) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang === 'vi' ? 'vi-VN' : 'en-US';
  utter.rate = 0.95;
  utter.pitch = 1;
  utter.volume = volume;
  const voices = window.speechSynthesis.getVoices();
  const code = lang === 'vi' ? 'vi' : 'en';
  const match = voices.find(v => v.lang.startsWith(code));
  if (match) utter.voice = match;
  window.speechSynthesis.speak(utter);
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  window.speechSynthesis.getVoices();
}

// ===== MESSAGE DISPLAY =====
function addMessage(panel, text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  panel.appendChild(div);
  if (autoScroll) panel.scrollTop = panel.scrollHeight;
  while (panel.children.length > 50) panel.removeChild(panel.firstChild);
}

function showInterim(panel, text) {
  let interim = panel.querySelector('.msg.interim');
  if (!interim) {
    interim = document.createElement('div');
    interim.className = 'msg interim';
    panel.appendChild(interim);
  }
  interim.textContent = text;
  if (autoScroll) panel.scrollTop = panel.scrollHeight;
}

function clearInterim(panel) {
  const interim = panel.querySelector('.msg.interim');
  if (interim) interim.remove();
}

// ===== DUAL RECOGNIZER (BOTH LANGUAGES SIMULTANEOUSLY) =====
function createRecognizer(lang, sourcePanel, targetPanel, targetLang, sourceLang) {
  const rec = new SpeechRecognition();
  rec.lang = lang === 'en' ? EN_LANG : VI_LANG;
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  let lastFinal = '';

  rec.onresult = (event) => {
    let interimText = '';
    let finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript;
      } else {
        interimText += transcript;
      }
    }

    if (finalText.trim() && finalText.trim() !== lastFinal) {
      lastFinal = finalText.trim();
      clearInterim(sourcePanel);
      addMessage(sourcePanel, finalText.trim(), 'original');

      // Translate and speak
      translateQueue = translateQueue.then(async () => {
        const translated = await translate(finalText.trim(), sourceLang, targetLang);
        addMessage(targetPanel, translated, 'translated');
        speak(translated, targetLang);
      });

      // Update detection badge
      if (sourceLang === 'en') {
        $langDetect.textContent = '🎤 English detected';
        $langDetect.className = 'detected en';
      } else {
        $langDetect.textContent = '🎤 Tiếng Việt detected';
        $langDetect.className = 'detected vi';
      }
      clearTimeout(window._detectReset);
      window._detectReset = setTimeout(() => {
        $langDetect.textContent = '🎤 Listening for both...';
        $langDetect.className = 'detected';
      }, 3000);
    }

    if (interimText.trim()) {
      showInterim(sourcePanel, interimText.trim());
    }
  };

  rec.onend = () => {
    // Auto-restart if still running (browsers stop recognition periodically)
    if (isRunning) {
      try { rec.start(); } catch(e) {}
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      stopAll();
      alert('Microphone access denied. Please allow microphone access in your browser settings and reload.');
    }
    if (e.error === 'aborted' || e.error === 'no-speech') return;
    console.warn('SpeechRecognition error (' + lang + '):', e.error);
    // Restart on error
    if (isRunning) {
      setTimeout(() => { try { rec.start(); } catch(e) {} }, 500);
    }
  };

  return rec;
}

// ===== START / STOP =====
function startAll() {
  isRunning = true;
  $mainBtn.classList.add('active');
  enLastFinal = '';
  viLastFinal = '';

  // Show both dots as listening
  $enDot.classList.add('listening');
  $viDot.classList.add('listening');
  $enWave.classList.add('active');
  $viWave.classList.add('active');
  $langDetect.textContent = '🎤 Listening for both...';
  $langDetect.className = 'detected';
  $modeLabel.textContent = 'Dual: EN + VI simultaneously';

  // Start English recognizer
  enRecognizer = createRecognizer('en', $enPanel, $viPanel, 'vi', 'en');
  try { enRecognizer.start(); } catch(e) { console.error('EN start error:', e); }

  // Start Vietnamese recognizer
  viRecognizer = createRecognizer('vi', $viPanel, $enPanel, 'en', 'vi');
  try { viRecognizer.start(); } catch(e) { console.error('VI start error:', e); }
}

function stopAll() {
  isRunning = false;
  $mainBtn.classList.remove('active');
  $enDot.classList.remove('listening');
  $viDot.classList.remove('listening');
  $enWave.classList.remove('active');
  $viWave.classList.remove('active');
  if (enRecognizer) { try { enRecognizer.stop(); } catch(e) {} enRecognizer = null; }
  if (viRecognizer) { try { viRecognizer.stop(); } catch(e) {} viRecognizer = null; }
  window.speechSynthesis.cancel();
  clearTimeout(window._detectReset);
  clearInterim($enPanel);
  clearInterim($viPanel);
  $langDetect.textContent = 'Tap mic to start';
  $langDetect.className = 'detected';
  $modeLabel.textContent = 'Dual: EN + VI simultaneously';
}

$mainBtn.addEventListener('click', () => {
  if (isRunning) stopAll();
  else startAll();
});

// ===== TOGGLES =====
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('ttsToggle').classList.toggle('active', ttsEnabled);
  if (!ttsEnabled) window.speechSynthesis.cancel();
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('autoScrollToggle').classList.toggle('active', autoScroll);
}

function clearAll() {
  $enPanel.innerHTML = '';
  $viPanel.innerHTML = '';
  translateQueue = Promise.resolve();
}
</script>
</body>
</html>
